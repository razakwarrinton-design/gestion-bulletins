    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="EduPulse" />
    <meta name="application-name" content="EduPulse" />
    <meta name="msapplication-TileColor" content="#2563eb" />

    <!-- SEO -->
    <meta
      name="description"
      content="EduPulse — Plateforme intelligente de gestion des notes et bulletins scolaires"
    />
    <meta
      name="keywords"
      content="EduPulse, bulletins, scolaire, notes, école, gestion, EdTech"
    />
    <meta name="author" content="EduPulse" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="EduPulse — Gestion Scolaire Intelligente"
    />
    <meta
      property="og:description"
      content="Plateforme complète de gestion des notes, bulletins PDF et suivi des élèves"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://gestion-bulletins-rho.vercel.app"
    />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="EduPulse" />
    <meta
      name="twitter:description"
      content="Plateforme intelligente de gestion scolaire"
    />

    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/icons/icon-152x152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="144x144"
      href="/icons/icon-144x144.png"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/icon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icons/icon-72x72.png"
    />

    <title>EduPulse — Gestion Scolaire</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => {
              console.log("✅ EduPulse SW enregistré:", reg.scope);
              reg.addEventListener("updatefound", () => {
                const newWorker = reg.installing;
                newWorker.addEventListener("statechange", () => {
                  if (
                    newWorker.state === "installed" &&
                    navigator.serviceWorker.controller
                  ) {
                    if (
                      confirm(
                        "🔄 Nouvelle version d'EduPulse disponible ! Mettre à jour ?",
                      )
                    ) {
                      newWorker.postMessage({ type: "SKIP_WAITING" });
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch((err) => console.log("❌ SW erreur:", err));
        });
      }
    </script>
  </body>
</html>
